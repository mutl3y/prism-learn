[tox]
envlist = py
skipsdist = False

[testenv]
package = editable
deps =
    pytest
    pytest-cov
    PyYAML
    psycopg[binary]
    prism-ansible @ git+https://github.com/mutl3y/prism.git@main
commands =
    pytest -v \
        --cov=src/prism_learn \
        --cov-report=term-missing:skip-covered \
        --cov-report=xml:coverage.xml \
        --cov-fail-under=70 \
        src/prism_learn/tests/
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:lint]
description = run ruff and black checks
skip_install = true
deps =
    ruff==0.15.6
    black==25.1.0
commands =
    ruff check src/
    black --check src/

[testenv:pre-commit]
description = run pre-commit hooks (useful locally and in CI)
skip_install = true
deps =
    pre-commit
commands =
    pre-commit run --all-files
