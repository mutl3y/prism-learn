[tox]
envlist = py
skipsdist = False

[testenv]
package = editable
deps =
    pytest
    pytest-cov
    PyYAML
    psycopg[binary]
    prism-ansible @ git+https://github.com/mutl3y/prism.git@main
commands =
    pytest -v \
        --cov=src/learning_app_scaffold \
        --cov-report=term-missing:skip-covered \
        --cov-report=xml:coverage.xml \
        --cov-fail-under=70 \
        src/learning_app_scaffold/tests/
setenv =
    PYTHONPATH = {toxinidir}/src
basepython = python3.14


[testenv:lint]
description = run ruff and black checks
deps =
    ruff
    black
commands =
    ruff check src/
    black --check src/
